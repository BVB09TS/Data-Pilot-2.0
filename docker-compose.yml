# DataPilot v2.0 — Docker Compose for local development and testing
version: "3.8"

services:
  datapilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datapilot
    ports:
      - "5000:5000"
    volumes:
      - ./shopmesh_dbt:/app/shopmesh_dbt:ro
      - ./output:/app/output
      - ./datapilot.yaml:/app/config/datapilot.yaml:ro
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATAPILOT_LOG_LEVEL=INFO
    command: ["audit", "--project", "/app/shopmesh_dbt", "--output", "/app/output", "--serve"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - datapilot-net

  # Optional: Redis for caching (if needed for distributed deployments)
  redis:
    image: redis:7-alpine
    container_name: datapilot-redis
    ports:
      - "6379:6379"
    networks:
      - datapilot-net
    profiles:
      - full

networks:
  datapilot-net:
    driver: bridge
