name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    name: API — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-governance/apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ai-governance/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ai-governance

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test:run
        env:
          SERVER_SECRET: ci-test-secret-32-chars-minimum!!

  # ── Web ──────────────────────────────────────────────────────────────────────
  web:
    name: Web — typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-governance/apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ai-governance/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ai-governance

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  # ── Docker ───────────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ai-governance/apps/api
          push: false
          tags: ai-governance-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
