name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-governance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ai-governance/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Build shared types
        run: pnpm --filter @types/shared build 2>/dev/null || true

      - name: Run API tests
        run: pnpm --filter @app/api test:run

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: ai-governance/apps/api/coverage/

  web-build:
    name: Web — build (F-6)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-governance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ai-governance/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Build shared types
        run: pnpm --filter @types/shared build 2>/dev/null || true

      - name: Build web (development mode)
        run: pnpm --filter @app/web exec vite build --mode development
        env:
          NODE_ENV: development

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [api-test, web-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ai-governance
          file: ai-governance/apps/api/Dockerfile
          push: false
          tags: datapilot-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ai-governance
          file: ai-governance/apps/web/Dockerfile
          push: false
          tags: datapilot-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
