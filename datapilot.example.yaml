# DataPilot v2.0 — Configuration File
# Copy to datapilot.yaml and customize for your environment

# dbt project path
project_root: ./shopmesh_dbt
output_dir: ./output
log_level: INFO

# LLM Providers — multi-model agent routing
# DataPilot routes tasks to optimal models:
#   - Free tier: simple/deterministic tasks (Groq Llama, Ollama)
#   - Standard tier: analysis tasks (GPT-4o-mini)
#   - Premium tier: complex reasoning (Claude, GPT-4o)
llm_providers:
  - provider: groq
    model: llama-3.3-70b-versatile
    api_key_env: GROQ_API_KEY
    tier: free
    rate_limit_rpm: 30

  - provider: groq
    model: llama-3.1-8b-instant
    api_key_env: GROQ_API_KEY
    tier: free
    rate_limit_rpm: 30

  # Uncomment to enable premium analysis:
  # - provider: anthropic
  #   model: claude-sonnet-4-20250514
  #   api_key_env: ANTHROPIC_API_KEY
  #   tier: premium
  #   cost_per_1k_input: 0.003
  #   cost_per_1k_output: 0.015

  # - provider: openai
  #   model: gpt-4o-mini
  #   api_key_env: OPENAI_API_KEY
  #   tier: standard
  #   cost_per_1k_input: 0.00015
  #   cost_per_1k_output: 0.0006

# Agent routing rules
routing:
  simple_tasks:
    - missing_tests
    - broken_refs
  standard_tasks:
    - dead_models
    - orphans
    - deprecated_sources
  premium_tasks:
    - duplicate_metrics
    - grain_joins
    - logic_drift
    - cross_model_analysis

# Pipeline configuration
pipeline:
  parallel_analysis: true
  max_workers: 4
  retry_attempts: 3
  retry_delay: 2.0
  enable_cache: true
  cache_ttl: 3600

# Enterprise integrations
integrations:
  # Apache Airflow
  airflow_base_url: ""
  airflow_dag_folder: ""

  # Snowflake
  snowflake_account: ""
  snowflake_warehouse: ""
  snowflake_database: ""
  snowflake_schema: DATAPILOT

  # AWS
  aws_region: us-east-1
  aws_s3_bucket: ""

  # Azure
  azure_storage_account: ""
  azure_container: datapilot

  # GitLab
  gitlab_url: ""
  gitlab_project_id: ""

  # Kafka / Message Bus
  kafka_bootstrap_servers: ""
  kafka_topic: datapilot-events

  # Power BI
  powerbi_workspace_id: ""
  powerbi_dataset_id: ""

  # dbt Cloud
  dbt_cloud_account_id: ""
  dbt_cloud_api_token_env: DBT_CLOUD_API_TOKEN

# Web dashboard
web:
  host: 0.0.0.0
  port: 5000
  debug: false
  cors_origins:
    - "*"
