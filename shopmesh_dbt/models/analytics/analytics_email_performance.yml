version: 2
models:
  - name: analytics_email_performance
    description: "Email campaign performance for marketing team."
    config:
      tags: ["analytics"]
    columns:
      - name: campaign_id
        description: "Campaign PK"
        tests:
          - unique
          - not_null
      - name: open_rate
        description: "opens / total_sent"
      - name: unsubscribe_rate
        description: "unsubscribes / total_sent"
