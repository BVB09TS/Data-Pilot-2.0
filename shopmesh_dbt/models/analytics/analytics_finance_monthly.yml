version: 2
models:
  - name: analytics_finance_monthly
    description: "Monthly finance report combining order revenue and refunds."
    config:
      tags: ["analytics"]
    columns:
      - name: report_month
        description: "Monthly grain"
        tests:
          - unique
          - not_null
      - name: gross_revenue
        description: "Sum of gross order revenue"
      - name: net_recognised_revenue
        description: "net_revenue minus total_refunds"
