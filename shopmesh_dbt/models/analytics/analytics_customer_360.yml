version: 2
models:
  - name: analytics_customer_360
    description: "Full 360 customer view for BI. Combines orders, subscriptions, segments, mobile."
    config:
      tags: ["analytics"]
    columns:
      - name: customer_id
        description: "Customer PK"
        tests:
          - unique
          - not_null
      - name: ltv_tier
        description: "platinum/gold/silver/bronze"
      - name: churn_status
        description: "active/at_risk/churning/churned"
      - name: estimated_ltv
        description: "net_revenue + annual_subscription_value"
