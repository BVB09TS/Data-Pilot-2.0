version: 2
models:
  - name: src_shopify_order_items
    description: "Order line items with typed quantities and computed gross amount."
    config:
      tags: ["source"]
    columns:
      - name: line_item_id
        description: "Line item PK"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "FK to src_shopify_orders"
      - name: quantity
        description: "Typed integer"
      - name: unit_price
        description: "Typed decimal"
      - name: gross_line_amount
        description: "unit_price * quantity"
