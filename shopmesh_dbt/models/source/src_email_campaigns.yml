version: 2
models:
  - name: src_email_campaigns
    description: "Email campaigns with typed timestamps."
    config:
      tags: ["source"]
    columns:
      - name: campaign_id
        description: "Campaign PK"
        tests:
          - unique
          - not_null
      - name: campaign_type
        description: "promotional/transactional/newsletter"
      - name: total_sent
        description: "Typed integer send count"
