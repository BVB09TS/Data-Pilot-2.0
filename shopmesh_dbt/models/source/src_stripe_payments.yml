version: 2
models:
  - name: src_stripe_payments
    description: "Stripe payments with amounts converted from cents to dollars."
    config:
      tags: ["source"]
    columns:
      - name: payment_id
        description: "Stripe payment PK"
        tests:
          - unique
          - not_null
      - name: payment_amount
        description: "Amount in USD"
      - name: refunded_amount
        description: "Refunded in USD"
      - name: net_payment_amount
        description: "payment_amount - refunded_amount"
