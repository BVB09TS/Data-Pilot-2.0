version: 2
models:
  - name: src_google_ads_performance
    description: "Google Ads daily performance with CTR derived. Grain: campaign_id + date."
    config:
      tags: ["source"]
    columns:
      - name: campaign_id
        description: "FK to campaigns"
      - name: performance_date
        description: "Report date"
        tests:
          - not_null
      - name: ad_spend
        description: "Spend in USD"
      - name: click_through_rate
        description: "clicks / impressions via safe_divide"
