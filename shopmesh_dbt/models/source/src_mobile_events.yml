version: 2
models:
  - name: src_mobile_events
    description: "Mobile events with typed timestamps. Grain: event_id."
    config:
      tags: ["source"]
    columns:
      - name: event_id
        description: "Event PK"
        tests:
          - unique
          - not_null
      - name: event_type
        description: "Event name"
      - name: platform
        description: "ios/android/web"
      - name: event_at
        description: "Typed timestamp"
        tests:
          - not_null
