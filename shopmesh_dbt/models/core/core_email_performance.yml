version: 2
models:
  - name: core_email_performance
    description: "Email campaign performance — open rate, click rate, unsubscribe rate."
    config:
      tags: ["core"]
    columns:
      - name: campaign_id
        description: "Campaign PK"
        tests:
          - unique
          - not_null
      - name: open_rate
        description: "opens / total_sent"
      - name: click_to_open_rate
        description: "clicks / opens"
      - name: unsubscribe_rate
        description: "unsubscribes / total_sent"
