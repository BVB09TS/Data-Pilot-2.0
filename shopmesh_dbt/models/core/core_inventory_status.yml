version: 2
models:
  - name: core_inventory_status
    description: "Current inventory per variant with health classification."
    config:
      tags: ["core"]
    columns:
      - name: variant_id
        description: "Variant PK"
        tests:
          - unique
          - not_null
      - name: quantity_on_hand
        description: "Current stock level"
      - name: stock_status
        description: "out_of_stock/below_reorder/healthy/overstock"
      - name: inventory_value
        description: "variant_price * quantity_on_hand"
