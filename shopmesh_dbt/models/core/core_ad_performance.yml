version: 2
models:
  - name: core_ad_performance
    description: "Google Ads performance enriched with campaign metadata."
    config:
      tags: ["core"]
    columns:
      - name: campaign_id
        description: "FK to campaigns"
      - name: performance_date
        description: "Report date"
      - name: ad_spend
        description: "Daily spend USD"
      - name: cost_per_click
        description: "ad_spend / clicks via safe_divide"
      - name: cost_per_conversion
        description: "ad_spend / conversions"
