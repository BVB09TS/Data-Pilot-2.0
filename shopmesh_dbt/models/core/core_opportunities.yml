version: 2
models:
  - name: core_opportunities
    description: "Salesforce pipeline with weighted value and status classification."
    config:
      tags: ["core"]
    columns:
      - name: opportunity_id
        description: "Opportunity PK"
        tests:
          - unique
          - not_null
      - name: weighted_pipeline_value
        description: "opportunity_value * win_probability / 100"
      - name: opportunity_status
        description: "won/lost/open"
