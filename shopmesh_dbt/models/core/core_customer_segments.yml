version: 2
models:
  - name: core_customer_segments
    description: "Customer segmentation based on RFM signals."
    config:
      tags: ["core"]
    columns:
      - name: customer_id
        description: "Customer PK"
        tests:
          - unique
          - not_null
      - name: ltv_tier
        description: "platinum/gold/silver/bronze"
      - name: churn_status
        description: "active/at_risk/churning/churned"
      - name: account_size
        description: "enterprise/mid_market/smb"
