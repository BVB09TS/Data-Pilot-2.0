version: 2
models:
  - name: core_customers
    description: "Customer master with LTV, segmentation and subscription value. Grain: one row per customer."
    config:
      tags: ["core"]
    columns:
      - name: customer_id
        description: "Customer PK"
      - name: customer_email
        description: "Customer email"
      - name: estimated_ltv
        description: "net_revenue + annual_subscription_value"
      - name: ltv_tier
        description: "platinum/gold/silver/bronze"
      - name: days_since_last_order
        description: "Recency metric"
