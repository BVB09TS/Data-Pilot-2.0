version: 2
models:
  - name: raw_mobile_events
    description: "Raw mobile app events. Grain: event_id."
    config:
      tags: ["raw", "mobile_app"]
    columns:
      - name: event_id
        description: "Event PK"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "App user ID"
        tests:

      - name: event_type
        description: "Event name"
        tests:

      - name: event_timestamp
        description: "Event timestamp"
        tests:

      - name: session_id
        description: "Session ID"
        tests:

      - name: platform
        description: "ios/android/web"
        tests:

      - name: properties_json
        description: "Event properties JSON"
        tests:

      - name: app_version
        description: "App version"
        tests:

