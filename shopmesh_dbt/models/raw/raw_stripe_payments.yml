version: 2
models:
  - name: raw_stripe_payments
    description: "Raw Stripe payment intents. Amounts in cents."
    config:
      tags: ["raw", "stripe"]
    columns:
      - name: payment_id
        description: "Stripe payment PK"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "FK to Shopify orders"
        tests:

      - name: amount_cents
        description: "Amount in cents"
        tests:

      - name: currency
        description: "ISO currency"
        tests:

      - name: status
        description: "succeeded/failed/pending"
        tests:

      - name: created_at
        description: "Payment timestamp"
        tests:

      - name: refunded_amount_cents
        description: "Refunded cents"
        tests:

      - name: payment_method
        description: "card/bank/wallet"
        tests:

