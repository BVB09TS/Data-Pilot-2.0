version: 2
models:
  - name: raw_shopify_orders
    description: "Raw Shopify orders. Zero transformation. One row per order."
    config:
      tags: ["raw", "shopify"]
    columns:
      - name: order_id
        description: "Shopify order PK"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK to customers"
        tests:

      - name: created_at
        description: "Order creation timestamp"
        tests:

      - name: updated_at
        description: "Last update timestamp"
        tests:

      - name: total_price
        description: "Total as string"
        tests:

      - name: financial_status
        description: "paid/pending/refunded"
        tests:

      - name: fulfillment_status
        description: "fulfilled/partial/null"
        tests:

      - name: cancelled_at
        description: "Cancellation timestamp"
        tests:

      - name: currency
        description: "ISO currency code"
        tests:

      - name: order_tags
        description: "Comma-separated tags"
        tests:

