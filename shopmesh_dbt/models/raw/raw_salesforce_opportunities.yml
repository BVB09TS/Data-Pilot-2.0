    columns:
      - name: opportunity_id
        description: "Opportunity PK"
        tests:
          - unique
          - not_null
      - name: account_id
        description: "FK to accounts"
        tests:

      - name: opportunity_name
        description: "Opportunity title"
        tests:

      - name: stage
        description: "Pipeline stage"
        tests:

      - name: amount_usd
        description: "Deal value USD"
        tests:

      - name: close_date
        description: "Expected close date"
        tests:

      - name: created_at
        description: "Creation timestamp"
        tests:

      - name: win_probability
        description: "Win probability 0-100"
        tests:

