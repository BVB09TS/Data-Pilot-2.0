version: 2
models:
  - name: raw_web_sessions
    description: "Raw web sessions from analytics platform."
    config:
      tags: ["raw", "web_analytics"]
    columns:
      - name: session_id
        description: "Session PK"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "Identified user if logged in"
        tests:

      - name: anonymous_id
        description: "Anonymous visitor ID"
        tests:

      - name: started_at
        description: "Session start"
        tests:

      - name: ended_at
        description: "Session end"
        tests:

      - name: traffic_source
        description: "organic/paid/email/direct"
        tests:

      - name: traffic_medium
        description: "Traffic medium"
        tests:

      - name: utm_campaign
        description: "UTM campaign"
        tests:

      - name: device_type
        description: "desktop/mobile/tablet"
        tests:

      - name: country_code
        description: "ISO country code"
        tests:

      - name: pageview_count
        description: "Pages viewed"
        tests:

