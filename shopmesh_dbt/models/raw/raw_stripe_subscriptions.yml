    description: "Raw Stripe subscription records."
    config:
      tags: ["raw", "stripe"]
    columns:
      - name: subscription_id
        description: "Subscription PK"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Stripe customer ID"
        tests:

      - name: plan_id
        description: "FK to plan_definitions"
        tests:

      - name: status
        description: "active/cancelled/trialing"
        tests:

      - name: started_at
        description: "Start timestamp"
        tests:

      - name: cancelled_at
        description: "Cancellation timestamp"
        tests:

      - name: monthly_amount_cents
        description: "Monthly charge cents"
        tests:

      - name: trial_ends_at
        description: "Trial end timestamp"
        tests:

