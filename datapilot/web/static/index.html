<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataPilot — AI-Powered dbt Docs</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ========== CSS Variables ========== */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #edf1f5; --bg2: #ffffff; --bg3: #f7f9fc; --surface: rgba(255, 255, 255, 0.95);
  --surface-alt: #eef5ff; --border: #d6dee8; --border2: #c2ccd8;
  --text: #0f172a; --text2: #4f5f78; --text3: #7c8ca5;
  --accent: #0f8ad8; --accent-hover: #0a6ab0; --accent-light: rgba(15, 138, 216, 0.12);
  --accent-2: #0ec0a2; --accent-2-light: rgba(14, 192, 162, 0.15);
  --green: #0fbc88; --green-bg: #d6f5ea; --red: #d94848; --red-bg: #fde2e1;
  --orange: #ff9f1c; --orange-bg: #ffe9d0; --yellow: #f2c744;
  --sidebar-w: 320px; --header-h: 64px;
  --raw-color: #1d6de0; --source-color: #06b6d4; --core-color: #0fbc88; --analytics-color: #f2994a;
  --shadow-sm: 0 1px 3px rgba(13, 31, 53, 0.08);
  --shadow: 0 12px 25px rgba(15, 31, 53, 0.07);
  --shadow-lg: 0 25px 55px rgba(15, 31, 53, 0.12);
  --shadow-glow: 0 0 25px rgba(15, 138, 216, 0.35);
  --radius: 10px; --radius-lg: 18px; --radius-xl: 28px;
  --font: 'Space Grotesk', 'Segoe UI', 'Avenir Next', sans-serif;
  --mono: 'IBM Plex Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
  --glass: blur(18px);
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #081120; --bg2: #0f192b; --bg3: #162338; --surface: rgba(19, 31, 54, 0.92);
  --surface-alt: #0f1d33; --border: #1f304a; --border2: #2a3d59;
  --text: #f4f7fb; --text2: #9fb1c9; --text3: #70829f;
  --accent: #41c1ff; --accent-hover: #1e9ad8; --accent-light: rgba(65, 193, 255, 0.16);
  --accent-2: #2ee6c5; --accent-2-light: rgba(46, 230, 197, 0.18);
  --green: #32e0a1; --green-bg: rgba(50, 224, 161, 0.15); --red: #ff6b6b; --red-bg: rgba(255, 107, 107, 0.15);
  --orange: #ffb347; --orange-bg: rgba(255, 179, 71, 0.18); --yellow: #ffe266;
  --raw-color: #5aa2ff; --source-color: #34d5f5; --core-color: #41e2b9; --analytics-color: #ffb347;
  --shadow: 0 18px 40px rgba(0, 0, 0, 0.55); --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 35px rgba(65, 193, 255, 0.4);
}

/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: var(--font); font-size: 14px; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; position: relative; }
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, rgba(15,138,216,0.25), transparent 45%),
              radial-gradient(circle at 80% 0%, rgba(14,192,162,0.18), transparent 30%),
              radial-gradient(circle at 70% 80%, rgba(251,153,74,0.15), transparent 35%);
  pointer-events: none;
  z-index: 0;
}
a { color: var(--accent); text-decoration: none; transition: var(--transition); }
a:hover { color: var(--accent-hover); text-decoration: none; }
button { cursor: pointer; font-family: var(--font); transition: var(--transition); }

/* ========== Layout ========== */

.app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }
.app::after {
  content: "";
  position: absolute; inset: 20px; border-radius: var(--radius-xl);
  border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
}

/* --- Header --- */
.header {
  height: var(--header-h); display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; padding: 0 32px; background: var(--surface);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  flex-shrink: 0; backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); box-shadow: var(--shadow-sm);
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-size: 24px; font-weight: 800; letter-spacing: -0.4px; color: var(--text); display: flex; align-items: center; gap: 10px; }
.logo span { background: linear-gradient(130deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.status-group { display: flex; align-items: center; gap: 8px; }
.status-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15);
  background: var(--surface-alt); color: var(--text2); font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase;
}
.status-live { color: var(--accent); border-color: rgba(15,138,216,0.3); }
.status-sync { color: var(--accent-2); border-color: rgba(14,192,162,0.3); }
.header-center { display: flex; justify-content: center; }
.header-right { display: flex; align-items: center; gap: 12px; }
.primary-btn {
  padding: 8px 16px; border-radius: var(--radius); background: var(--accent);
  color: white; border: none; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-sm);
}
.primary-btn:hover { background: var(--accent-hover); }
.ghost-btn {
  padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 13px; font-weight: 600;
}
.ghost-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Navigation tabs */
.nav-tabs { display: flex; gap: 6px; height: 100%; align-items: center; justify-content: center; }
.nav-tab {
  display: flex; align-items: center; gap: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600;
  color: var(--text2); border: 1px solid transparent; background: transparent; border-radius: 999px;
  transition: var(--transition);
}
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { color: var(--accent); border-color: rgba(15,138,216,0.3); background: var(--accent-light); }
.nav-tab svg { width: 16px; height: 16px; }

/* Search box */
.search-box {
  display: flex; align-items: center; gap: 8px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px; width: 260px;
  position: relative;
}
.search-box input {
  border: none; background: none; outline: none; font-size: 13px; color: var(--text);
  width: 100%; font-family: var(--font);
}
.search-box input::placeholder { color: var(--text3); }
.command-hint {
  font-size: 11px; color: var(--text3); border: 1px solid var(--border); border-radius: 6px;
  padding: 1px 6px; background: var(--surface);
}
.search-box svg { width: 14px; height: 14px; color: var(--text3); flex-shrink: 0; }

/* Theme toggle */
.theme-toggle {
  width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg2); display: flex; align-items: center; justify-content: center; color: var(--text2);
}
.theme-toggle:hover { background: var(--bg3); color: var(--text); }

/* --- Main content area --- */
.main { display: flex; flex: 1; overflow: hidden; position: relative; }

.activity-bar {
  width: 60px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 12px 0;
  gap: 10px; box-shadow: var(--shadow-sm);
}
.activity-item {
  width: 40px; height: 40px; border-radius: 12px; border: 1px solid transparent;
  background: transparent; color: var(--text2); display: flex; align-items: center; justify-content: center;
}
.activity-item.active { background: var(--accent-light); color: var(--accent); border-color: rgba(15,138,216,0.3); }
.workspace-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.workspace-toolbar {
  padding: 20px 28px 12px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.workspace-context { display: flex; flex-direction: column; gap: 4px; }
.workspace-breadcrumb { font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text3); }
.workspace-heading { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.workspace-subheading { font-size: 13px; color: var(--text2); }
.workspace-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.workspace-tag {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text3);
}
.workspace-actions { display: flex; align-items: center; gap: 10px; }

/* --- Sidebar --- */
.sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; backdrop-filter: var(--glass);
}
.sidebar-tabs { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
.sidebar-tab {
  padding: 12px 0; font-size: 11px; font-weight: 600; color: var(--text3);
  border: none; background: none; cursor: pointer; letter-spacing: 0.05em;
}
.sidebar-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
.sidebar-top { padding: 14px 16px 8px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
.sidebar-heading { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; font-weight: 700; }
.sidebar-heading .count { font-size: 11px; color: var(--text3); }
.sidebar-search {
  display: flex; align-items: center; gap: 6px; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 10px; background: var(--bg3);
}
.sidebar-search input {
  border: none; background: none; outline: none; font-size: 12px; width: 100%; color: var(--text);
}
.sidebar-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.sidebar-filter-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-weight: 600;
}
.sidebar-filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 4px 0; }
.sidebar-empty { padding: 24px 16px; font-size: 12px; color: var(--text3); text-align: center; }

/* Tree */
.tree-group { margin-bottom: 2px; }
.tree-group-header {
  display: flex; align-items: center; gap: 8px; padding: 6px 16px; font-size: 12px;
  font-weight: 600; cursor: pointer; color: var(--text2); user-select: none;
}
.tree-group-header:hover { background: var(--bg3); color: var(--text); }
.tree-group-header .arrow { font-size: 10px; transition: transform 0.15s; width: 12px; text-align: center; }
.tree-group-header .arrow.open { transform: rotate(90deg); }
.tree-group-header .layer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tree-group-header .layer-count { margin-left: auto; font-size: 10px; color: var(--text3); font-weight: 400; }

.tree-items { display: none; }
.tree-items.open { display: block; }
.tree-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 16px 6px 28px; font-size: 13px;
  cursor: pointer; color: var(--text2); border-left: 2px solid transparent; transition: all 0.1s;
}
.tree-item:hover { background: var(--bg3); color: var(--text); }
.tree-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
.tree-item .problem-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.tree-item .model-icon { font-size: 11px; color: var(--text3); width: 14px; text-align: center; }

/* --- Content area --- */
.content { flex: 1; overflow-y: auto; background: var(--bg); }

/* ========== Overview Tab ========== */
.overview { padding: 28px; max-width: 1400px; }
.overview h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px; box-shadow: var(--shadow);
}
.stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.stat-card .sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

.severity-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.sev-card {
  border-radius: var(--radius); padding: 16px; text-align: center;
  border: 1px solid var(--border); background: var(--surface);
}
.sev-card .sev-count { font-size: 32px; font-weight: 700; }
.sev-card .sev-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; font-weight: 600; }
.sev-critical .sev-count { color: var(--red); }
.sev-high .sev-count { color: var(--orange); }
.sev-medium .sev-count { color: var(--yellow); }
.sev-low .sev-count { color: var(--green); }

/* Score card */
.score-section {
  display: flex; gap: 20px; margin-bottom: 24px; align-items: stretch;
}
.score-ring-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 24px; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center;
  min-width: 180px;
}
.score-ring { position: relative; width: 120px; height: 120px; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .score-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 28px; font-weight: 700;
}
.score-ring .score-subtitle { font-size: 12px; color: var(--text2); margin-top: 8px; }

.findings-breakdown {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow);
}
.breakdown-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
.breakdown-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.breakdown-bar-label { font-size: 12px; width: 140px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.breakdown-bar-track { flex: 1; height: 20px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
.breakdown-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; color: white; min-width: 24px; }
.breakdown-bar-count { font-size: 12px; font-weight: 600; width: 30px; text-align: right; }

/* ========== Findings Tab ========== */
.findings-page { padding: 24px; max-width: 1400px; }
.findings-page h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

.findings-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface);
  font-size: 12px; color: var(--text2); font-weight: 500; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

.findings-table { width: 100%; border-collapse: collapse; }
.findings-table th {
  text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.04em; color: var(--text2); border-bottom: 2px solid var(--border);
  font-weight: 600; position: sticky; top: 0; background: var(--bg);
}
.findings-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
.findings-table tr { cursor: pointer; transition: background 0.1s; }
.findings-table tbody tr:hover { background: var(--bg2); }

.sev-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
  font-weight: 600; text-transform: uppercase;
}
.sev-badge.critical { background: var(--red-bg); color: var(--red); }
.sev-badge.high { background: var(--orange-bg); color: var(--orange); }
.sev-badge.medium { background: #fff3cd; color: #997a00; }
[data-theme="dark"] .sev-badge.medium { background: #3d3520; color: var(--yellow); }
.sev-badge.low { background: var(--green-bg); color: var(--green); }

.type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
  background: var(--bg2); color: var(--text2); font-weight: 500;
}

/* ========== Model Detail ========== */
.model-detail { padding: 24px; max-width: 1200px; }
.model-header { margin-bottom: 20px; }
.model-header h2 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.model-header .layer-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; text-transform: uppercase;
}
.layer-raw { background: #f3f0ff; color: var(--raw-color); }
.layer-source { background: #e7f1ff; color: var(--source-color); }
.layer-core { background: #d1e7dd; color: var(--core-color); }
.layer-analytics { background: #fff3cd; color: var(--analytics-color); }
[data-theme="dark"] .layer-raw { background: #2a1f4e; }
[data-theme="dark"] .layer-source { background: #1a3352; }
[data-theme="dark"] .layer-core { background: #1a3328; }
[data-theme="dark"] .layer-analytics { background: #3d2e1a; }

.model-description { font-size: 14px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
.model-stats { display: flex; gap: 20px; margin-top: 12px; }
.model-stat { font-size: 12px; color: var(--text2); }
.model-stat strong { color: var(--text); }

.model-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.model-tab {
  padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text2);
  border: none; background: none; border-bottom: 2px solid transparent;
}
.model-tab:hover { color: var(--text); }
.model-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.model-tab-content { display: none; }
.model-tab-content.active { display: block; }

/* SQL code */
.sql-block {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; overflow-x: auto; font-family: var(--mono); font-size: 13px;
  line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--text);
}
.sql-block .kw { color: var(--accent); font-weight: 600; }
.sql-block .fn { color: var(--purple); }
.sql-block .str { color: var(--green); }
.sql-block .cm { color: var(--text3); font-style: italic; }
.sql-block .ref { color: var(--orange); font-weight: 500; }

/* Columns table */
.columns-table { width: 100%; border-collapse: collapse; }
.columns-table th {
  text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase;
  color: var(--text2); border-bottom: 2px solid var(--border); font-weight: 600;
}
.columns-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
.columns-table .col-name { font-family: var(--mono); font-weight: 500; }
.columns-table .test-badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
  background: var(--green-bg); color: var(--green); margin: 1px 2px; font-weight: 500;
}
.columns-table .no-tests { color: var(--text3); font-style: italic; font-size: 12px; }

/* Lineage mini */
.lineage-mini { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
.lineage-col { flex: 1; min-width: 200px; }
.lineage-col h4 { font-size: 12px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
.lineage-node {
  display: flex; align-items: center; gap: 8px; padding: 6px 12px; margin-bottom: 4px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 12px; cursor: pointer; transition: all 0.1s;
}
.lineage-node:hover { border-color: var(--accent); background: var(--accent-light); }
.lineage-center {
  font-size: 14px; font-weight: 600; padding: 12px 20px;
  background: var(--accent-light); border: 2px solid var(--accent); border-radius: var(--radius);
  text-align: center;
}
.lineage-arrows { display: flex; align-items: center; justify-content: center; padding: 0 12px; color: var(--text3); font-size: 20px; }

/* Model findings list */
.model-finding {
  padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px; background: var(--surface);
}
.model-finding .mf-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.model-finding .mf-evidence { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.model-finding .mf-action { font-size: 12px; color: var(--green); font-style: italic; }

/* Models hub */
.models-hub { padding: 28px; max-width: 1400px; display: flex; flex-direction: column; gap: 24px; }
.models-hub-header { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; justify-content: space-between; }
.models-hub-header h2 { font-size: 20px; font-weight: 700; }
.models-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
.model-layer-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 8px;
}
.model-layer-card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
.model-layer-card .layer-count { font-size: 28px; font-weight: 700; }
.model-layer-card ul { list-style: none; margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.model-layer-card li { font-size: 12px; display: flex; justify-content: space-between; color: var(--text2); }
.layer-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
.layer-pill .dot { width: 10px; height: 10px; border-radius: 50%; }
.models-table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
.models-table-wrapper table { width: 100%; border-collapse: collapse; }
.models-table-wrapper th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); color: var(--text3); }
.models-table-wrapper td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
.models-table-wrapper tr:hover { background: var(--bg3); cursor: pointer; }

/* AI Copilot */
.ai-chat-backdrop {
  position: fixed; inset: 0; background: rgba(10, 24, 42, 0.45);
  opacity: 0; pointer-events: none; transition: var(--transition); z-index: 180;
}
.ai-chat-backdrop.show { opacity: 1; pointer-events: auto; }
.ai-chat {
  position: fixed; bottom: 28px; right: 28px; width: min(380px, calc(100vw - 32px));
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column; gap: 12px; padding: 18px;
  transform: translateY(20px); opacity: 0; pointer-events: none; z-index: 200;
  transition: var(--transition);
}
.ai-chat.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
.ai-chat-header { display: flex; justify-content: space-between; align-items: center; }
.ai-chat-title { font-size: 16px; font-weight: 700; }
.ai-chat-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }
.ai-chat-close {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 18px; line-height: 1;
}
.ai-chat-close:hover { background: var(--bg3); }
.ai-chat-messages {
  max-height: 360px; overflow-y: auto; display: flex; flex-direction: column;
  gap: 10px; padding-right: 6px;
}
.ai-message { padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg3); }
.ai-message.user { background: var(--accent-light); border-color: rgba(15,138,216,0.3); }
.ai-message.assistant { background: var(--surface); }
.ai-message .meta { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 4px; }
.ai-message .body { font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.ai-message .foot { font-size: 11px; color: var(--text3); margin-top: 6px; }
.ai-chat-input { display: flex; flex-direction: column; gap: 8px; }
.ai-chat-input textarea {
  width: 100%; border-radius: var(--radius); border: 1px solid var(--border);
  padding: 8px 10px; resize: vertical; min-height: 60px; font-family: var(--font); font-size: 13px;
  background: var(--bg2); color: var(--text);
}
.ai-chat-input textarea:focus { border-color: var(--accent); outline: none; }
.ai-chat-actions { display: flex; align-items: center; justify-content: space-between; }
.ai-chat-footnote { font-size: 11px; color: var(--text3); }
.ai-chat-send {
  border: none; background: var(--accent); color: white; font-weight: 600;
  padding: 8px 16px; border-radius: 999px; font-size: 13px;
}
.ai-chat-send:disabled { opacity: 0.6; cursor: not-allowed; }

/* ========== Lineage Graph Tab ========== */
.lineage-page { height: 100%; display: flex; flex-direction: column; }
.lineage-toolbar {
  display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding: 14px 20px;
  border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
}
.lineage-toolbar button {
  padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg3); font-size: 12px; color: var(--text2); font-weight: 600;
}
.lineage-toolbar button:hover { background: var(--bg2); color: var(--text); }
.lineage-toolbar button.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.lineage-legend { display: flex; gap: 16px; margin-left: auto; font-size: 11px; color: var(--text2); flex-wrap: wrap; }
.lineage-legend span { display: flex; align-items: center; gap: 4px; }
.lineage-legend .dot { width: 10px; height: 10px; border-radius: 50%; }
#lineage-canvas { flex: 1; overflow: hidden; background: var(--bg3); border-radius: var(--radius-lg); border: 1px solid var(--border); min-height: 420px; }
#lineage-canvas svg { width: 100%; height: 100%; }

.lineage-split { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; flex: 1; padding: 16px 20px 24px; }
.lineage-inspector {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px; display: flex; flex-direction: column; gap: 16px; box-shadow: var(--shadow-sm);
}
.lineage-inspector h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
.inspector-meta { font-size: 13px; color: var(--text2); line-height: 1.5; }
.inspector-list { list-style: none; display: flex; flex-direction: column; gap: 8px; font-size: 12px; }
.inspector-list li { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); display: flex; justify-content: space-between; }
.inspector-empty { font-size: 12px; color: var(--text3); text-align: center; }
.lineage-aux {
  padding: 0 20px 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;
}
.lineage-minimap {
  border: 1px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 16px; min-height: 150px; background: var(--surface-alt);
  display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 12px;
}
.lineage-metrics { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
.lineage-metrics h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
.lineage-metrics dl { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; font-size: 13px; }
.lineage-metrics dt { color: var(--text3); }
.lineage-metrics dd { font-weight: 600; }

/* Graph node styling */
.graph-node rect { rx: 6; ry: 6; stroke-width: 1.5; cursor: pointer; transition: all 0.15s; }
.graph-node rect:hover { stroke-width: 2.5; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
.graph-node text { font-size: 10px; font-family: var(--font); pointer-events: none; }
.graph-edge { fill: none; stroke-width: 1.5; opacity: 0.5; }
.graph-edge.highlighted { opacity: 1; stroke-width: 2.5; }
.graph-node.dimmed rect { opacity: 0.2; }
.graph-node.dimmed text { opacity: 0.2; }
.graph-edge.dimmed { opacity: 0.05; }
.graph-node.highlighted rect { stroke-width: 2.5; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2)); }

/* Search results dropdown */
.search-results {
  position: absolute; top: 100%; left: 0; right: 0; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg);

}
.search-results.show { display: block; }
.search-result-item {

}
.search-result-item:hover { background: var(--bg2); }
.search-result-item:last-child { border-bottom: none; }
.search-result-layer { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 13px; }

/* Tooltip */
.tooltip {
  position: absolute; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow-lg);
  font-size: 12px; z-index: 500; pointer-events: none; max-width: 300px; display: none;
}
.tooltip.show { display: block; }
.tooltip .tt-title { font-weight: 600; margin-bottom: 4px; }
.tooltip .tt-row { color: var(--text2); margin-bottom: 2px; }

/* ========== dbt-style Lineage Overlay ========== */
.lineage-overlay {
  position: fixed; top: 52px; right: 0; width: 360px; height: calc(100vh - 52px);
  background: linear-gradient(180deg, #0d4f4f 0%, #0a3d3d 100%);
  border-left: 1px solid rgba(255,255,255,0.1);
  z-index: 90; display: none; flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.15);
}
.lineage-overlay.show { display: flex; }
.lineage-overlay-header {
  padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.lineage-overlay-header h3 { font-size: 14px; font-weight: 600; color: #e0f2f1; letter-spacing: 0.02em; }
.lineage-overlay-actions { display: flex; gap: 8px; }
.lineage-overlay-btn {
  width: 32px; height: 32px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: #b2dfdb; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: all 0.15s;
}
.lineage-overlay-btn:hover { background: rgba(255,255,255,0.15); color: white; }
.lineage-overlay-body {
  flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.lineage-overlay-graph {
  display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%;
}
.lineage-overlay-node {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  background: rgba(255,255,255,0.08); border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
  font-size: 12px; color: #e0f2f1; font-family: var(--mono); cursor: pointer; transition: all 0.15s;
  width: 100%; max-width: 280px; justify-content: center;
}
.lineage-overlay-node:hover { background: rgba(255,255,255,0.12); }
.lineage-overlay-node.current { background: rgba(255,255,255,0.15); border-color: #4dd0e1; }
.lineage-overlay-node .node-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.lineage-overlay-arrow {

}
.lineage-overlay-empty { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; padding: 24px; }

/* AI Analysis section */
.ai-section {
  background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(139,92,246,0.08) 100%);
  border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius-lg);

}

.ai-section-stats { display: flex; gap: 20px; flex-wrap: wrap; }
.ai-stat { font-size: 13px; color: var(--text2); }
.ai-stat strong { color: var(--text); }
.ai-stat code { background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>

<script>
// ==================== State ====================
let state = {
  report: null, graph: null, models: null,
  activeTab: 'overview', selectedModel: null,
  findingsFilter: 'all', theme: localStorage.getItem('dp-theme') || 'light',
  allModelsFlat: [],
  sidebarFilter: '',
  sidebarOnlyIssues: false,
  sidebarLayerFilter: null,   // null = all, 'source' = source layer only, 'tests' = models with test findings
  lineageIssuesOnly: false,
};

const chatState = {
  open: false,
  sending: false,
  messages: [
    {
      role: 'assistant',
      content: 'Hi! I\'m your DataPilot Copilot. Select a model or ask about lineage, quality findings, or opportunities to optimize.',
      meta: { timestamp: new Date().toISOString() },
    },
  ],
};

// ==================== Init ====================
async function init() {
  applyTheme(state.theme);
  setupEventListeners();
  const [reportData, graphData, modelsData] = await Promise.all([
    fetch('/api/report').then(r => r.json()),
    fetch('/api/graph').then(r => r.json()),
    fetch('/api/models').then(r => r.json()),
  ]);
  state.report = reportData;
  state.graph = graphData;
  state.models = modelsData;

  // Flatten models
  state.allModelsFlat = [];
  for (const [layer, models] of Object.entries(state.models)) {
    for (const m of models) {
      state.allModelsFlat.push(m);
    }
  }

  const countEl = document.getElementById('model-count');
  if (countEl) countEl.textContent = `${state.allModelsFlat.length} models`;
  renderSidebar();
  renderContent();
}

// ==================== Theme ====================
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  state.theme = theme;
  localStorage.setItem('dp-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (theme === 'dark') {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
  } else {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  }
}

// ==================== Event Listeners ====================
function setupEventListeners() {
  // Tabs
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.activeTab = tab.dataset.tab;
      state.selectedModel = null;
      hideLineageOverlay();
       updateLineageInspector(null);
      renderContent();
    });
  });

  // Lineage overlay
  document.getElementById('lineage-close').addEventListener('click', hideLineageOverlay);
  document.getElementById('lineage-fullscreen').addEventListener('click', toggleLineageFullscreen);

  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', () => {
    applyTheme(state.theme === 'light' ? 'dark' : 'light');
    if (state.activeTab === 'lineage') renderContent(); // re-render graph with new colors
  });

  // Search
  const searchInput = document.getElementById('global-search');
  const searchResults = document.getElementById('search-results');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) { searchResults.classList.remove('show'); return; }
    const matches = state.allModelsFlat.filter(m =>
      m.name.toLowerCase().includes(q) || m.description.toLowerCase().includes(q)
    ).slice(0, 10);
    if (!matches.length) { searchResults.classList.remove('show'); return; }
    searchResults.innerHTML = matches.map(m => `
      <div class="search-result-item" onclick="selectModel('${m.name}')">
        <span class="search-result-layer layer-${m.layer}" style="background:var(--${m.layer}-color);color:white">${m.layer}</span>
        <span>${m.name}</span>
        ${m.has_problem ? '<span style="color:var(--red)">&#9679;</span>' : ''}
      </div>
    `).join('');
    searchResults.classList.add('show');
  });
  searchInput.addEventListener('blur', () => setTimeout(() => searchResults.classList.remove('show'), 200));

  // Ctrl+K shortcut
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
    if (e.key === 'Escape') {
      searchInput.blur();
      searchResults.classList.remove('show');
      if (chatState.open) closeChat();
    }
  });

  setupChatUI();
}

// ==================== Sidebar ====================
function renderSidebar() {
  const tree = document.getElementById('model-tree');
  if (!tree || !state.models) return;
  const layers = ['raw', 'source', 'core', 'analytics'];
  const layerColors = { raw: 'var(--raw-color)', source: 'var(--source-color)', core: 'var(--core-color)', analytics: 'var(--analytics-color)' };
  const layerIcons = { raw: '&#9671;', source: '&#9651;', core: '&#9679;', analytics: '&#9733;' };

  const filterText = state.sidebarFilter;
  let visibleCount = 0;

  const groups = layers.map(layer => {
    const models = state.models[layer] || [];
    const filtered = models.filter(m => {
      const blob = `${m.name} ${(m.description || '')} ${(m.tags || []).join(' ')}`.toLowerCase();
      const matchesText = !filterText || blob.includes(filterText);
      const matchesIssues = !state.sidebarOnlyIssues || m.has_problem;
      const matchesLayer = !state.sidebarLayerFilter
        || (state.sidebarLayerFilter === 'source' && layer === 'source')
        || (state.sidebarLayerFilter === 'tests' && m.findings_count > 0);
      return matchesText && matchesIssues && matchesLayer;
    });
    visibleCount += filtered.length;
    if (!filtered.length) return '';
    return `
      <div class="tree-group">
        <div class="tree-group-header" onclick="toggleTreeGroup(this)">
          <span class="arrow open">&#9654;</span>
          <span class="layer-dot" style="background:${layerColors[layer]}"></span>
          <span>models/${layer}</span>
          <span class="layer-count">${filtered.length}</span>
        </div>
        <div class="tree-items open">
          ${filtered.map(m => `
            <div class="tree-item ${state.selectedModel === m.name ? 'active' : ''}" onclick="selectModel('${m.name}')">
              <span class="model-icon">${layerIcons[layer]}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${m.description || ''}">${m.name}</span>
              ${m.has_problem ? '<span class="problem-dot"></span>' : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).filter(Boolean);

  tree.innerHTML = groups.length ? groups.join('') : '<div class="sidebar-empty">No models match your filters.</div>';

  const countEl = document.getElementById('model-count');
  if (countEl) countEl.textContent = `${visibleCount} models`;

  const searchInput = document.getElementById('sidebar-search');
  if (searchInput) {
    searchInput.value = state.sidebarFilter;
    searchInput.oninput = (e) => {
      state.sidebarFilter = e.target.value.toLowerCase();
      renderSidebar();
    };
  }
  const issuesBtn = document.getElementById('sidebar-issues');
  if (issuesBtn) issuesBtn.classList.toggle('active', state.sidebarOnlyIssues);
}

function toggleTreeGroup(el) {
  const items = el.nextElementSibling;
  const arrow = el.querySelector('.arrow');
  items.classList.toggle('open');
  arrow.classList.toggle('open');
}

function toggleSidebarIssues() {
  state.sidebarOnlyIssues = !state.sidebarOnlyIssues;
  renderSidebar();
}

function setSidebarTab(btn, layerFilter) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  state.sidebarLayerFilter = layerFilter;
  renderSidebar();
}

function updateLineageInspector(modelName) {
  const inspector = document.getElementById('lineage-inspector');
  if (!inspector) return;
  if (!modelName) {
    inspector.innerHTML = '<h3>Lineage Inspector</h3><div class="inspector-empty">Select a node to inspect upstream and downstream dependencies.</div>';
    return;
  }
  const model = state.allModelsFlat.find(m => m.name === modelName);
  const edges = state.graph?.edges || state.report?.graph?.edges || [];
  const upstream = edges.filter(e => e.target === modelName).map(e => e.source);
  const downstream = edges.filter(e => e.source === modelName).map(e => e.target);
  inspector.innerHTML = `
    <h3>Lineage Inspector</h3>
    <div class="inspector-meta">
      <strong>${modelName}</strong><br/>
      Layer: ${model?.layer || '—'} &middot; Columns: ${model?.columns?.length || 0} &middot; Findings: ${model?.findings_count || 0}
    </div>
    <div>
      <strong style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Upstream (${upstream.length})</strong>
      ${upstream.length ? `<ul class="inspector-list">${upstream.slice(0,6).map(u => `<li><span>${u}</span><button class="ghost-btn" style="padding:2px 6px;font-size:11px" onclick="selectModel('${u}')">Open</button></li>`).join('')}</ul>` : '<div class="inspector-empty">No upstream dependencies</div>'}
    </div>
    <div>
      <strong style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Downstream (${downstream.length})</strong>
      ${downstream.length ? `<ul class="inspector-list">${downstream.slice(0,6).map(d => `<li><span>${d}</span><button class="ghost-btn" style="padding:2px 6px;font-size:11px" onclick="selectModel('${d}')">Open</button></li>`).join('')}</ul>` : '<div class="inspector-empty">No downstream consumers</div>'}
    </div>
  `;
}

// ==================== Content Router ====================
function renderContent() {
  const content = document.getElementById('content');
  if (!content) return;
  if (state.selectedModel) {
    renderModelDetail(content);
  } else {
    switch (state.activeTab) {
      case 'overview': renderOverview(content); break;
      case 'lineage': renderLineage(content); break;
      case 'findings': renderFindings(content); break;
      case 'models': renderModelsHub(content); break;
      default: renderOverview(content); break;
    }
  }
  updateWorkspaceContext();
  syncActivityBar();
}

function switchTab(tabName) {
  const tab = document.querySelector(`.nav-tab[data-tab="${tabName}"]`);
  if (tab) tab.click();
}

function syncActivityBar() {
  document.querySelectorAll('.activity-item').forEach(btn => {
    const target = btn.getAttribute('data-activity-tab');
    btn.classList.toggle('active', target === state.activeTab || (state.selectedModel && target === 'models' && state.activeTab !== 'lineage' && state.activeTab !== 'findings'));
  });
}

// ==================== Select Model ====================
function selectModel(name) {
  state.selectedModel = name;
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tree-item').forEach(el => {
    if (el.textContent.trim().includes(name)) el.classList.add('active');
  });
  document.getElementById('search-results').classList.remove('show');
  document.getElementById('global-search').value = '';
  renderContent();
  updateLineageOverlay(name);
  updateLineageInspector(name);
  document.getElementById('lineage-overlay').classList.add('show');
}

function updateLineageOverlay(modelName) {
  const body = document.getElementById('lineage-overlay-body');
  if (!body) return;
  const edges = state.graph?.edges || state.report?.graph?.edges || [];
  const upstream = edges.filter(e => e.target === modelName).map(e => e.source);
  const downstream = edges.filter(e => e.source === modelName).map(e => e.target);
  const hasAny = upstream.length > 0 || downstream.length > 0;
  const rows = [];
  if (upstream.length) {
    rows.push(`<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);margin-bottom:6px">Upstream · ${upstream.length}</div>`);
    upstream.slice(0, 3).forEach(u => {
      rows.push(`<div class="lineage-overlay-node" onclick="selectModel('${u}')"><span class="node-dot" style="background:${getLayerColor(u)}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u}</span></div>`);
    });
    if (upstream.length > 3) rows.push(`<div style="font-size:11px;color:rgba(255,255,255,0.35);text-align:center;padding:4px">+${upstream.length - 3} more</div>`);
    rows.push('<div class="lineage-overlay-arrow">&#8595;</div>');
  }
  rows.push(`<div class="lineage-overlay-node current"><span class="node-dot" style="background:${getLayerColor(modelName)}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${modelName}</span></div>`);
  if (downstream.length) {
    rows.push('<div class="lineage-overlay-arrow">&#8595;</div>');
    rows.push(`<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);margin-top:2px;margin-bottom:6px">Downstream · ${downstream.length}</div>`);
    downstream.slice(0, 3).forEach(d => {
      rows.push(`<div class="lineage-overlay-node" onclick="selectModel('${d}')"><span class="node-dot" style="background:${getLayerColor(d)}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d}</span></div>`);
    });
    if (downstream.length > 3) rows.push(`<div style="font-size:11px;color:rgba(255,255,255,0.35);text-align:center;padding:4px">+${downstream.length - 3} more</div>`);
  }
  body.innerHTML = hasAny
    ? `<div class="lineage-overlay-graph">${rows.join('')}</div>`
    : '<div class="lineage-overlay-empty">No lineage connections for this model.</div>';
}

function hideLineageOverlay() {
  document.getElementById('lineage-overlay').classList.remove('show');
}

function toggleLineageFullscreen() {
  const ov = document.getElementById('lineage-overlay');
  ov.classList.toggle('fullscreen');
  if (ov.classList.contains('fullscreen')) {
    ov.style.cssText = 'top:0;right:0;width:100%;height:100%;';
  } else {
    ov.style.cssText = '';
  }
}

function toggleLineageIssues() {
  state.lineageIssuesOnly = !state.lineageIssuesOnly;
  const btn = document.getElementById('lineage-issues-btn');
  if (btn) btn.classList.toggle('active', state.lineageIssuesOnly);
  applyLineageIssueFilter();
}

function applyLineageIssueFilter() {
  if (!state.graph) return;
  const issueMap = {};
  (state.graph.nodes || []).forEach(n => { issueMap[n.id] = n.has_problem; });
  const nodes = d3.selectAll('.graph-node');
  const edges = d3.selectAll('.graph-edge');
  nodes.classed('dimmed', d => state.lineageIssuesOnly && !d.has_problem);
  if (!state.lineageIssuesOnly) {
    edges.classed('dimmed', false);
    return;
  }
  edges.classed('dimmed', function() {
    const s = this.getAttribute('data-source');
    const t = this.getAttribute('data-target');
    return !(issueMap[s] || issueMap[t]);
  });
}

// ==================== Overview ====================

    duplicate_metric: 'var(--accent)', logic_drift: '#20c997', redundant_model: '#e83e8c',

  const circumference = 2 * Math.PI * 45;

  container.innerHTML = `
    <div class="overview">

          <div class="sub">findings across all models</div>
        </div>
        <div class="stat-card">
          <div class="label">Lineage Edges</div>

          <div class="sub">lineage connections</div>
        </div>
      </div>

        <div class="sev-card sev-high"><div class="sev-count">${sev.high || 0}</div><div class="sev-label">High</div></div>
        <div class="sev-card sev-medium"><div class="sev-count">${sev.medium || 0}</div><div class="sev-label">Medium</div></div>
        <div class="sev-card sev-low"><div class="sev-count">${sev.low || 0}</div><div class="sev-label">Low</div></div>
      </div>

      ${(() => {
    const astats = r.agent_stats || {};
    const totalCalls = Object.values(astats).reduce((s, x) => s + (x.calls || 0), 0);
    const hasFindings = (r.total_findings || 0) > 0;
    if (totalCalls > 0) {
      return `
      <div class="ai-section">
        <div class="ai-section-title"><span>&#9881;</span> AI Analysis</div>
        <div class="ai-section-stats">
          <span class="ai-stat">Findings reviewed by <strong>${totalCalls}</strong> AI agent call${totalCalls !== 1 ? 's' : ''} across 8 specialist agents</span>
        </div>
      </div>`;
    }
    if (hasFindings) {
      return `
      <div class="ai-section" style="border-color: rgba(99,102,241,0.3)">
        <div class="ai-section-title"><span>&#9881;</span> AI Analysis</div>
        <div class="ai-section-stats">
          <span class="ai-stat">Set <code>GROQ_API_KEY</code> in <code>.env</code> to enable AI-assisted analysis.</span>
        </div>
      </div>`;
    }
    return '';
  })()}

      <div class="score-section">
        <div class="score-ring-card">
          <div class="score-ring">
            <svg viewBox="0 0 100 100" width="120" height="120">
              <circle cx="50" cy="50" r="45" fill="none" stroke="var(--bg3)" stroke-width="8"/>
              <circle cx="50" cy="50" r="45" fill="none" stroke="${scoreColor}" stroke-width="8"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
            </svg>
            <div class="score-text" style="color:${scoreColor}">${scorePct}%</div>
          </div>
          <div class="score-ring .score-subtitle" style="font-size:12px;color:var(--text2);margin-top:8px">
            ${score.found || 0} / ${score.planted || 0} planted problems found
          </div>
          <div style="font-size:12px;margin-top:4px;font-weight:600;color:${score.passed ? 'var(--green)' : 'var(--red)'}">
            ${score.passed ? 'PASSED' : 'NEEDS WORK'}
          </div>
        </div>

        <div class="findings-breakdown">
          <div class="breakdown-title">Findings by Type</div>
          ${Object.entries(byType).sort((a, b) => b[1] - a[1]).map(([type, count]) => `
            <div class="breakdown-bar-row">
              <span class="breakdown-bar-label">${type.replace(/_/g, ' ')}</span>
              <div class="breakdown-bar-track">

                  ${count}

          `).join('')}
        </div>
      </div>

function updateWorkspaceContext() {
  const headingEl = document.getElementById('workspace-heading');
  const subEl = document.getElementById('workspace-subheading');
  const crumbEl = document.getElementById('workspace-breadcrumb');
  const tagsEl = document.getElementById('workspace-tags');
  if (!headingEl || !subEl || !crumbEl || !tagsEl) return;

  if (state.selectedModel) {
    const model = state.allModelsFlat.find(m => m.name === state.selectedModel);
    headingEl.textContent = state.selectedModel;
    subEl.textContent = model?.description || 'Model detail overview';
    crumbEl.textContent = `Model • ${model?.layer || 'dbt'}`;
    tagsEl.innerHTML = model ? `
      <span class="workspace-tag">Layer: ${model.layer}</span>
      <span class="workspace-tag">${model.columns.length} columns</span>
      <span class="workspace-tag">Findings: ${model.findings_count}</span>
    ` : '';
    updateChatStatus();
    return;
  }

  const tabMeta = {
    overview: { title: 'Project Health', desc: 'Audit summary for your dbt project' },
    models: { title: 'Model Catalog', desc: 'Browse models by layer, tag, and status' },
    lineage: { title: 'Lineage Graph', desc: 'Explore model dependencies and data flow' },
    findings: { title: 'Audit Findings', desc: 'Review and remediate quality issues' },
  };
  const meta = tabMeta[state.activeTab] || tabMeta.overview;
  headingEl.textContent = meta.title;
  subEl.textContent = meta.desc;
  crumbEl.textContent = `Project • ${meta.title}`;

  const counts = {
    models: state.allModelsFlat.length,
    edges: state.graph?.edges?.length || 0,
    findings: state.report?.report?.total_findings || 0,
  };

  let tagsHtml = '';
  if (state.activeTab === 'lineage') {
    tagsHtml = `
      <span class="workspace-tag">${counts.models} nodes</span>
      <span class="workspace-tag">${counts.edges} edges</span>
    `;
  } else if (state.activeTab === 'models') {
    const layerCount = state.models ? Object.values(state.models).filter(arr => arr.length).length : 0;
    tagsHtml = `
      <span class="workspace-tag">Layers: ${layerCount}</span>
      <span class="workspace-tag">Issues: ${state.report?.report?.total_findings || 0}</span>
    `;
  } else if (state.activeTab === 'findings') {
    tagsHtml = `
      <span class="workspace-tag">${counts.findings} findings</span>
      <span class="workspace-tag">${counts.models} models</span>
    `;
  } else {
    tagsHtml = `
      <span class="workspace-tag">${counts.models} models</span>
      <span class="workspace-tag">${counts.edges} dependencies</span>
    `;
  }
  tagsEl.innerHTML = tagsHtml;
  updateChatStatus();
}

// ==================== Findings ====================
function renderFindings(container) {
  const r = state.report?.report || state.report || {};
  const findings = r.findings || [];
  const types = ['all', ...new Set(findings.map(f => f.type))];

  container.innerHTML = `
    <div class="findings-page">
      <h2>Audit Findings</h2>
      <div class="findings-filters" id="findings-filters">
        ${types.map(t => `
          <button class="filter-chip ${state.findingsFilter === t ? 'active' : ''}" onclick="filterFindings('${t}')">
            ${t === 'all' ? 'All' : t.replace(/_/g, ' ')} (${t === 'all' ? findings.length : findings.filter(f => f.type === t).length})
          </button>
        `).join('')}
      </div>
      <table class="findings-table">
        <thead>
          <tr><th>Severity</th><th>Model</th><th>Type</th><th>Evidence</th><th>Recommended Action</th></tr>
        </thead>
        <tbody id="findings-tbody"></tbody>
      </table>
    </div>
  `;

  showFilteredFindings(findings);
}

function filterFindings(type) {
  state.findingsFilter = type;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  const r = state.report?.report || state.report || {};
  showFilteredFindings(r.findings || []);
}

function showFilteredFindings(findings) {
  const filtered = state.findingsFilter === 'all' ? findings : findings.filter(f => f.type === state.findingsFilter);
  const tbody = document.getElementById('findings-tbody');
  if (!tbody) return;
  tbody.innerHTML = filtered.map(f => `
    <tr onclick="selectModel('${f.model}')">
      <td><span class="sev-badge ${f.severity}">${f.severity}</span></td>
      <td style="font-weight:500;font-family:var(--mono);font-size:12px">${f.model}</td>
      <td><span class="type-badge">${(f.type || '').replace(/_/g, ' ')}</span></td>
      <td style="font-size:12px;color:var(--text2);max-width:300px">${f.evidence || ''}</td>
      <td style="font-size:12px;color:var(--text2);max-width:250px">${f.action || ''}</td>
    </tr>
  `).join('');
}

function switchModelTab(btn, tabId) {
  document.querySelectorAll('.model-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.model-tab-content').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const el = document.getElementById('tab-' + tabId);
  if (el) el.classList.add('active');
}

function getLayerColor(name) {
  if (name.startsWith('raw')) return 'var(--raw-color)';
  if (name.startsWith('src')) return 'var(--source-color)';
  if (name.startsWith('core')) return 'var(--core-color)';
  if (name.startsWith('analytics')) return 'var(--analytics-color)';
  return 'var(--text3)';
}

function highlightSQL(sql) {
  return sql
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/--(.*)$/gm, '<span class="cm">--$1</span>')
    .replace(/\{\{.*?\}\}/g, m => `<span class="ref">${m}</span>`)
    .replace(/'([^']*)'/g, '<span class="str">\'$1\'</span>')
    .replace(/\b(select|from|where|join|left|right|inner|outer|on|as|with|group\s+by|order\s+by|having|union|all|distinct|case|when|then|else|end|and|or|not|in|is|null|true|false|between|like|limit|offset|insert|update|delete|create|drop|alter|into|values|set|exists|cast|coalesce|if|date_trunc|sum|count|avg|min|max|row_number|rank|dense_rank|over|partition\s+by|asc|desc)\b/gi,
      m => `<span class="kw">${m}</span>`)
    ;
}

function escapeHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==================== AI Copilot ====================
function setupChatUI() {
  const toggle = document.getElementById('chat-toggle');
  const chat = document.getElementById('ai-chat');
  const closeBtn = document.getElementById('ai-chat-close');
  const backdrop = document.getElementById('ai-chat-backdrop');
  const form = document.getElementById('ai-chat-form');
  if (!toggle || !chat || !closeBtn || !form || !backdrop) return;

  toggle.addEventListener('click', () => openChat());
  closeBtn.addEventListener('click', () => closeChat());
  backdrop.addEventListener('click', () => closeChat());
  form.addEventListener('submit', sendChatMessage);
  renderChatMessages();
  updateChatStatus();
}

function openChat() {
  chatState.open = true;
  document.getElementById('ai-chat').classList.add('open');
  document.getElementById('ai-chat-backdrop').classList.add('show');
  setTimeout(() => document.getElementById('ai-chat-input-field').focus(), 50);
}

function closeChat() {
  chatState.open = false;
  document.getElementById('ai-chat').classList.remove('open');
  document.getElementById('ai-chat-backdrop').classList.remove('show');
}

function appendChatMessage(role, content, meta = {}) {
  chatState.messages.push({ role, content, meta: { ...meta, timestamp: meta.timestamp || new Date().toISOString() } });
  renderChatMessages();
}

function renderChatMessages() {
  const container = document.getElementById('ai-chat-messages');
  if (!container) return;
  container.innerHTML = chatState.messages.map(msg => {
    const meta = msg.meta || {};
    const foot = [];
    if (meta.model) foot.push(`${meta.model}`);
    if (typeof meta.latency_ms === 'number') foot.push(`${Math.round(meta.latency_ms)}ms`);
    if (meta.error) foot.push('error');
    return `
      <div class="ai-message ${msg.role}">
        <div class="meta">${msg.role === 'user' ? 'You' : 'Copilot'}</div>
        <div class="body">${escapeHtml(msg.content)}</div>
        ${foot.length ? `<div class="foot">${foot.join(' • ')}</div>` : ''}
      </div>
    `;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function updateChatStatus(text) {
  const statusEl = document.getElementById('ai-chat-status');
  if (!statusEl) return;
  if (text) {
    statusEl.textContent = text;
    return;
  }
  statusEl.textContent = state.selectedModel ? `Context: ${state.selectedModel}` : 'Ready for questions';
}

function buildChatContext() {
  if (!state.selectedModel) return '';
  const model = state.allModelsFlat.find(m => m.name === state.selectedModel);
  if (!model) return '';
  const columnSnippets = (model.columns || []).slice(0, 10).map(c => `${c.name}: ${c.description || ''}`).join('\n');
  const findingsSnippets = (model.findings || []).slice(0, 5).map(f => `${f.type || 'finding'} (${f.severity}): ${f.evidence || ''}`).join('\n');
  return [
    `Model Description: ${model.description || 'n/a'}`,
    columnSnippets ? `Columns:\n${columnSnippets}` : '',
    findingsSnippets ? `Findings:\n${findingsSnippets}` : '',
  ].filter(Boolean).join('\n\n');
}

async function sendChatMessage(event) {
  event.preventDefault();
  if (chatState.sending) return;
  const input = document.getElementById('ai-chat-input-field');
  const text = input.value.trim();
  if (!text) return;
  appendChatMessage('user', text, {});
  input.value = '';
  chatState.sending = true;
  updateChatStatus('Thinking...');
  const sendBtn = document.querySelector('.ai-chat-send');
  if (sendBtn) sendBtn.disabled = true;
  const payload = {
    message: text,
    model: state.selectedModel,
    context: buildChatContext(),
  };
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI request failed');
    appendChatMessage('assistant', data.reply || 'No response', {
      model: `${data.provider}/${data.model}`,
      latency_ms: data.latency_ms,
      cost_usd: data.cost_usd,
    });
  } catch (err) {
    appendChatMessage('assistant', err.message || 'Unable to reach AI copilot.', { error: true });
  } finally {
    chatState.sending = false;
    updateChatStatus();
    const sendBtn2 = document.querySelector('.ai-chat-send');
    if (sendBtn2) sendBtn2.disabled = false;
  }
}

// ==================== Lineage Graph ====================
function renderLineage(container) {
  const nodesCount = (state.graph?.nodes || []).length;
  const edgesCount = (state.graph?.edges || []).length;
  const issueCount = (state.graph?.nodes || []).filter(n => n.has_problem).length;
  const avgDegree = nodesCount ? ((edgesCount * 2) / nodesCount).toFixed(1) : 0;

  container.innerHTML = `
    <div class="lineage-page">
      <div class="lineage-toolbar">
        <button onclick="resetLineageView()">Reset View</button>
        <button onclick="fitLineage()">Fit to Screen</button>
        <button id="lineage-issues-btn" class="${state.lineageIssuesOnly ? 'active' : ''}" onclick="toggleLineageIssues()">Highlight Issues</button>
        <button onclick="hideLineageOverlay()">Hide Overlay</button>
        <div class="lineage-legend">
          <span><span class="dot" style="background:var(--raw-color)"></span> Raw</span>
          <span><span class="dot" style="background:var(--source-color)"></span> Source</span>
          <span><span class="dot" style="background:var(--core-color)"></span> Core</span>
          <span><span class="dot" style="background:var(--analytics-color)"></span> Analytics</span>
          <span><span class="dot" style="background:var(--red)"></span> Issues</span>
        </div>
      </div>
      <div class="lineage-split">
        <div id="lineage-canvas"></div>
        <aside class="lineage-inspector" id="lineage-inspector">
          <h3>Lineage Inspector</h3>
          <div class="inspector-empty">Select a node to inspect upstream/downstream relationships.</div>
        </aside>
      </div>
      <div class="lineage-aux">
        <div class="lineage-minimap" id="lineage-minimap">Mini-map view coming soon. Use zoom controls to explore.</div>
        <div class="lineage-metrics">
          <h4>Graph Metrics</h4>
          <dl>
            <dt>Nodes</dt><dd>${nodesCount}</dd>
            <dt>Edges</dt><dd>${edgesCount}</dd>
            <dt>Avg. degree</dt><dd>${avgDegree}</dd>
            <dt>Issues</dt><dd>${issueCount}</dd>
          </dl>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => drawLineageGraph(), 50);
  updateLineageInspector(state.selectedModel);
}

let lineageSvg, lineageG, lineageZoom;

function drawLineageGraph() {
  const canvas = document.getElementById('lineage-canvas');
  if (!canvas) return;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  const nodes = state.graph?.nodes || [];
  const edges = state.graph?.edges || [];

  // Assign layer order for horizontal layout
  const layerOrder = { raw: 0, source: 1, core: 2, analytics: 3 };
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = { ...n, x: 0, y: 0 }; });

  // Also add phantom nodes from edges
  edges.forEach(e => {
    if (!nodeMap[e.source]) nodeMap[e.source] = { id: e.source, layer: guessLayer(e.source), has_problem: false, x: 0, y: 0 };
    if (!nodeMap[e.target]) nodeMap[e.target] = { id: e.target, layer: guessLayer(e.target), has_problem: false, x: 0, y: 0 };
  });

  // Group by layer
  const layerGroups = {};
  Object.values(nodeMap).forEach(n => {
    const l = n.layer || 'core';
    if (!layerGroups[l]) layerGroups[l] = [];
    layerGroups[l].push(n);
  });

  // Position nodes
  const nodeW = 160, nodeH = 32, padX = 220, padY = 42;
  const layers = ['raw', 'source', 'core', 'analytics'];
  layers.forEach((l, li) => {
    const group = layerGroups[l] || [];
    group.sort((a, b) => a.id.localeCompare(b.id));
    group.forEach((n, i) => {
      n.x = li * padX + 40;
      n.y = i * padY + 60;
    });
  });

  // SVG
  const svg = d3.select(canvas).html('').append('svg').attr('width', w).attr('height', h);
  const g = svg.append('g');
  lineageSvg = svg;
  lineageG = g;

  // Zoom
  lineageZoom = d3.zoom().scaleExtent([0.1, 3]).on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(lineageZoom);

  const getColor = (layer) => {
    const cs = getComputedStyle(document.documentElement);
    const map = { raw: '--raw-color', source: '--source-color', core: '--core-color', analytics: '--analytics-color' };
    return cs.getPropertyValue(map[layer] || '--text3').trim();
  };

  // Edges
  const edgeG = g.append('g');
  edges.forEach(e => {
    const s = nodeMap[e.source];
    const t = nodeMap[e.target];
    if (!s || !t) return;
    edgeG.append('path')
      .attr('class', 'graph-edge')
      .attr('d', `M${s.x + nodeW},${s.y + nodeH / 2} C${s.x + nodeW + 60},${s.y + nodeH / 2} ${t.x - 60},${t.y + nodeH / 2} ${t.x},${t.y + nodeH / 2}`)
      .attr('stroke', 'var(--border2)')
      .attr('data-source', e.source)
      .attr('data-target', e.target);
  });

  // Nodes
  const nodeG = g.selectAll('.graph-node')
    .data(Object.values(nodeMap))
    .enter().append('g')
    .attr('class', 'graph-node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .attr('data-id', d => d.id)
    .on('click', (ev, d) => selectModel(d.id))
    .on('mouseenter', (ev, d) => highlightLineage(d.id))
    .on('mouseleave', () => clearHighlight());

  nodeG.append('rect')
    .attr('width', nodeW).attr('height', nodeH)
    .attr('fill', d => d.has_problem ? 'var(--red-bg)' : 'var(--surface)')
    .attr('stroke', d => getColor(d.layer));

  nodeG.append('text')
    .attr('x', 8).attr('y', nodeH / 2 + 4)
    .attr('fill', 'var(--text)')
    .text(d => d.id.length > 22 ? d.id.slice(0, 20) + '..' : d.id);

  // Problem indicator
  nodeG.filter(d => d.has_problem).append('circle')
    .attr('cx', nodeW - 10).attr('cy', nodeH / 2)
    .attr('r', 4).attr('fill', 'var(--red)');

  applyLineageIssueFilter();
  // Fit to screen
  setTimeout(fitLineage, 100);
}

function guessLayer(name) {
  if (name.startsWith('raw')) return 'raw';
  if (name.startsWith('src')) return 'source';
  if (name.startsWith('core')) return 'core';
  if (name.startsWith('analytics')) return 'analytics';
  return 'core';
}

function highlightLineage(nodeId) {
  const connected = new Set([nodeId]);
  const edges = state.graph?.edges || [];
  // BFS upstream and downstream
  let changed = true;
  while (changed) {
    changed = false;
    edges.forEach(e => {
      if (connected.has(e.source) && !connected.has(e.target)) { connected.add(e.target); changed = true; }
      if (connected.has(e.target) && !connected.has(e.source)) { connected.add(e.source); changed = true; }
    });
  }

  d3.selectAll('.graph-node').classed('dimmed', d => !connected.has(d.id)).classed('highlighted', d => d.id === nodeId);
  d3.selectAll('.graph-edge').classed('dimmed', function() {
    return !connected.has(this.getAttribute('data-source')) || !connected.has(this.getAttribute('data-target'));
  }).classed('highlighted', function() {
    return connected.has(this.getAttribute('data-source')) && connected.has(this.getAttribute('data-target'));
  });
}

function clearHighlight() {
  d3.selectAll('.graph-node').classed('dimmed', false).classed('highlighted', false);
  d3.selectAll('.graph-edge').classed('dimmed', false).classed('highlighted', false);
}

function resetLineageView() {
  if (lineageSvg && lineageZoom) lineageSvg.transition().duration(500).call(lineageZoom.transform, d3.zoomIdentity);
}

function fitLineage() {
  if (!lineageG || !lineageSvg) return;
  const canvas = document.getElementById('lineage-canvas');
  if (!canvas) return;
  const bounds = lineageG.node().getBBox();
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const scale = Math.min(w / (bounds.width + 80), h / (bounds.height + 80), 1.5) * 0.9;
  const tx = (w - bounds.width * scale) / 2 - bounds.x * scale;
  const ty = (h - bounds.height * scale) / 2 - bounds.y * scale;
  lineageSvg.transition().duration(500).call(lineageZoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}
